version: '3.9'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    image: elgitano-frontend:latest
    container_name: elgitano-v2
    restart: unless-stopped
    ports:
      - "3080:80"          # Acceder por http://servidor:3080
    environment:
      - NODE_ENV=production
    extra_hosts:
      # Permite que el nginx del container resuelva "backend" al host XAMPP
      - "backend:host-gateway"
    networks:
      - elgitano-net

networks:
  elgitano-net:
    driver: bridge
